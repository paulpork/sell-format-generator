<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Describer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Item Describer</h1>
        <form id="item-form">
            <label for="item-name">Item Name:</label>
            <input type="text" id="item-name" required>

            <label for="sell-price">Sell Price:</label>
            <input type="number" id="sell-price" required>

            <label for="orig-price">Original Price:</label>
            <input type="number" id="orig-price" required>

            <label for="avalibility">Avalibility:</label>
            <input type="text" id="avalibility" required>
            <!--
            <select id="is-new" required>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
            -->
            <button type="submit">Generate Description</button>
        </form>

        <div id="output" class="output"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
