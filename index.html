<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Describer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>格式生產器</h1>
        <form id="item-form">
            <label for="商品名稱">Item Name:</label>
            <input type="text" id="item-name" required>

            <label for="售價">Sell Price:</label>
            <input type="number" id="sell-price" required>

            <label for="日幣原價">Original Price:</label>
            <input type="number" id="orig-price" required>

            <label for="官方管道是否可取得">availability:</label>
            <!--
            <input type="text" id="availability" required>
            -->
            <select id="avail-option" required>
                <option value="否">否</option>
                <option value="是 (場地販售/快閃店)">是 (場地販售/快閃店)</option>
            </select>
            <button type="submit">Generate Description</button>
        </form>

        <div id="output" class="output"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
