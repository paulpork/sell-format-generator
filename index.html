<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Describer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>格式生產器v0.81</h1>
        <form id="item-form">
            <label for="商品名稱">商品名稱:</label>
            <input type="text" id="item-name" required>

            <label for="售價">售價:</label>
            <input type="number" id="sell-price" required>

            <label for="日幣原價">日幣原價:</label>
            <input type="number" id="orig-price" required>

            <label for="availability">官方管道是否可取得：</label>
            <!--
            <input type="text" id="availability" required>
            -->
            <select id="availability" required>
                <option value="avail-value-1">否</option>
                <option value="avail-value-2">是 (場地販售/快閃店)</option>
            </select>
            <button type="submit">生成格式文字</button>
        </form>

        <div id="output" class="output"></div>
        <button id="copy-btn" type="button" disabled>複製結果</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
